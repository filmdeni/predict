<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <radialGradient id="orb" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="url(#bg)"/>

  <!-- Glow halo behind orb -->
  <circle cx="32" cy="34" r="14" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Crystal ball body -->
  <circle cx="32" cy="34" r="13" fill="url(#orb)"/>

  <!-- Shine highlight -->
  <ellipse cx="27" cy="28" rx="4" ry="3" fill="white" opacity="0.25" transform="rotate(-20 27 28)"/>
  <ellipse cx="26.5" cy="27.5" rx="1.5" ry="1" fill="white" opacity="0.5" transform="rotate(-20 26.5 27.5)"/>

  <!-- Inner eye pupil -->
  <ellipse cx="32" cy="34" rx="5.5" ry="4" fill="#0f0f1a" opacity="0.7"/>
  <circle cx="32" cy="34" r="2.5" fill="#f0abfc"/>
  <circle cx="33" cy="33" r="1" fill="white" opacity="0.8"/>

  <!-- Stand base -->
  <path d="M25 47 Q32 44 39 47" stroke="#a855f7" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M27 47.5 Q32 49.5 37 47.5" stroke="#a855f7" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.3"/>

  <!-- Stars -->
  <circle cx="14" cy="16" r="1" fill="#f0abfc" opacity="0.8"/>
  <circle cx="48" cy="12" r="1.5" fill="#e879f9" opacity="0.7"/>
  <circle cx="52" cy="26" r="1" fill="#c084fc" opacity="0.6"/>
  <circle cx="11" cy="40" r="1" fill="#f0abfc" opacity="0.5"/>
  <circle cx="20" cy="13" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="45" cy="48" r="0.7" fill="#f0abfc" opacity="0.5"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30.5" stroke="#a855f7" stroke-width="0.5" opacity="0.4"/>
</svg>
